name: CI and Deploy Open WebUI Theme

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  statuses: write

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.14
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}
  NEXT_PUBLIC_API_URL: ""
  NEXT_PUBLIC_AI_MODELS: ${{ vars.NEXT_PUBLIC_AI_MODELS || 'panyakorn-local:latest' }}

jobs:
  validate:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test if script exists
        run: |
          set -euo pipefail
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            bun run test
          else
            echo "No test script configured; skipping."
          fi

      - name: Verify required agent skills
        run: bun run skills:check

      - name: Build
        run: bun run build

      - name: Report validate status to commit
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const conclusion = '${{ job.status }}';
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: conclusion === 'success' ? 'success' : 'failure',
              target_url: runUrl,
              description: 'Validate (lint + test + build): ' + (conclusion === 'success' ? 'passed' : 'failed'),
              context: '${{ github.workflow }} / validate'
            });

  docker-validate:
    name: Validate production Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and load production image for validation
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: open-webui-theme:pr-${{ github.event.number }}
          push: false
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_AI_MODELS=${{ env.NEXT_PUBLIC_AI_MODELS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test the image
        run: bash .github/scripts/smoke-test-image.sh "open-webui-theme:pr-${{ github.event.number }}"

      - name: Report docker-validate status to commit
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const conclusion = '${{ job.status }}';
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: conclusion === 'success' ? 'success' : 'failure',
              target_url: runUrl,
              description: 'Docker image validation: ' + (conclusion === 'success' ? 'passed' : 'failed'),
              context: '${{ github.workflow }} / docker-validate'
            });

  image:
    name: Build, scan, and publish image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.image.outputs.image }}
      tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set image tags
        id: image
        run: |
          set -euo pipefail
          image="$(echo "${REGISTRY_IMAGE}" | tr '[:upper:]' '[:lower:]')"
          tag="${GITHUB_SHA}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${image}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${tag}" >> "$GITHUB_ENV"
          echo "FULL_IMAGE=${image}:${tag}" >> "$GITHUB_ENV"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image with GitHub Actions cache
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_AI_MODELS=${{ env.NEXT_PUBLIC_AI_MODELS }}
          tags: |
            ${{ env.FULL_IMAGE }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test the image before publishing
        run: bash .github/scripts/smoke-test-image.sh "$FULL_IMAGE"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.FULL_IMAGE }}
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Push the scanned image to GHCR
        run: |
          set -euo pipefail
          docker push "$FULL_IMAGE"

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: image
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment:
      name: production
      url: https://chat.panyakorn.com
    permissions:
      contents: read
      packages: write
      statuses: write

    env:
      DEPLOY_IMAGE: ${{ needs.image.outputs.image }}:${{ needs.image.outputs.tag }}
      IMAGE_REPOSITORY: ${{ needs.image.outputs.image }}
      PUBLIC_DOMAIN: chat.panyakorn.com
      IMAGE_RETENTION: "5"

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Notify deploy start
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_WEBHOOK_URL is not set; skipping pre-deploy notification."
            exit 0
          fi
          set -euo pipefail
          payload=$(python3 - <<'PY'
          import json, os
          data = {
              "content": (
                  "🚀 **open-webui-theme deploy starting**\n"
                  f"Commit: `{os.environ['GITHUB_SHA'][:7]}`\n"
                  f"Image: `{os.environ['DEPLOY_IMAGE']}`\n"
                  f"Run: {os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
              )
          }
          print(json.dumps(data))
          PY
          )
          curl -fsS -H 'Content-Type: application/json' -d "$payload" "$DISCORD_WEBHOOK_URL"

      - name: Check required deployment secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for name in VPS_HOST VPS_USER VPS_SSH_KEY VPS_HOST_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required repository secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Prepare SSH key and known hosts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s %s\n' "$VPS_HOST" "$VPS_HOST_KEY" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Verify production DNS prerequisite
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -euo pipefail
          domain_addresses="$(getent ahosts "$PUBLIC_DOMAIN" | awk '{print $1}' | sort -u)"
          vps_addresses="$(getent ahosts "$VPS_HOST" | awk '{print $1}' | sort -u)"

          if [ -z "$domain_addresses" ] || [ -z "$vps_addresses" ]; then
            echo "::error::Could not resolve ${PUBLIC_DOMAIN} or the configured VPS host."
            exit 1
          fi

          address_matches=0
          while IFS= read -r address; do
            if grep -Fqx "$address" <<< "$vps_addresses"; then
              address_matches=1
              break
            fi
          done <<< "$domain_addresses"

          if [ "$address_matches" -ne 1 ]; then
            echo "::error::DNS for ${PUBLIC_DOMAIN} does not point to the configured VPS."
            echo "Resolved domain addresses: ${domain_addresses//$'\n'/, }"
            exit 1
          fi

      - name: Deploy on VPS with rollback
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_IMAGE: ${{ env.DEPLOY_IMAGE }}
          IMAGE_REPOSITORY: ${{ env.IMAGE_REPOSITORY }}
          NEXT_PUBLIC_AI_MODELS: ${{ env.NEXT_PUBLIC_AI_MODELS }}
          IMAGE_RETENTION: ${{ env.IMAGE_RETENTION }}
          PUBLIC_DOMAIN: ${{ env.PUBLIC_DOMAIN }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          remote_env=$(printf 'DEPLOY_IMAGE=%q IMAGE_REPOSITORY=%q NEXT_PUBLIC_AI_MODELS=%q IMAGE_RETENTION=%q PUBLIC_DOMAIN=%q GHCR_USERNAME=%q' \
            "$DEPLOY_IMAGE" "$IMAGE_REPOSITORY" "$NEXT_PUBLIC_AI_MODELS" "$IMAGE_RETENTION" "$PUBLIC_DOMAIN" "$GHCR_USERNAME")
          {
            printf '%s\n' "$GHCR_TOKEN"
            cat .github/scripts/deploy-open-webui-theme.sh
          } | ssh -i ~/.ssh/deploy_key \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=60 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=4 \
              "${VPS_USER}@${VPS_HOST}" \
              "IFS= read -r GHCR_TOKEN; export GHCR_TOKEN; ${remote_env} bash -se"

      - name: Verify public domain
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if curl -fsSI --max-time 20 "https://${PUBLIC_DOMAIN}" >/tmp/headers.txt; then
              cat /tmp/headers.txt
              exit 0
            fi
            sleep 15
          done
          echo "Public HTTPS verification failed for https://${PUBLIC_DOMAIN} even though DNS resolves."
          exit 1

      - name: Push latest tag after successful deploy
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" --password-stdin
          docker tag "$DEPLOY_IMAGE" "${IMAGE_REPOSITORY}:latest"
          docker push "${IMAGE_REPOSITORY}:latest"

      - name: Set commit status
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const conclusion = '${{ job.status }}';
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: conclusion === 'success' ? 'success' : 'failure',
              target_url: runUrl,
              description: '${{ github.workflow }} deploy: ' + (conclusion === 'success' ? 'passed' : 'failed'),
              context: '${{ github.workflow }} / deploy'
            });

      - name: Notify Discord on failure (rollback triggered)
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_WEBHOOK_URL is not set; skipping failure notification."
            exit 0
          fi
          set -euo pipefail
          payload=$(python3 - <<'PY'
          import json
          import os

          data = {
              "content": (
                  "🚨 **open-webui-theme rollback triggered**\n"
                  f"Commit: `{os.environ['GITHUB_SHA'][:7]}`\n"
                  f"Workflow: {os.environ['GITHUB_WORKFLOW']}\n"
                  f"Run: {os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
              )
          }
          print(json.dumps(data))
          PY
          )
          curl -fsS -H 'Content-Type: application/json' -d "$payload" "$DISCORD_WEBHOOK_URL"

      - name: Notify Discord on success
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_WEBHOOK_URL is not set; skipping success notification."
            exit 0
          fi
          set -euo pipefail
          payload=$(python3 - <<'PY'
          import json
          import os

          data = {
              "content": (
                  "✅ **open-webui-theme deployed successfully**\n"
                  f"Commit: `{os.environ['GITHUB_SHA'][:7]}`\n"
                  f"Workflow: {os.environ['GITHUB_WORKFLOW']}\n"
                  f"Run: {os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
              )
          }
          print(json.dumps(data))
          PY
          )
          curl -fsS -H 'Content-Type: application/json' -d "$payload" "$DISCORD_WEBHOOK_URL"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts
